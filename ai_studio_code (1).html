<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jakarta - Simple Design</title>
    <style>
        /* Menggunakan font modern yang bersih */
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;800&display=swap');

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background-color: #e6e7a8;
            font-family: 'Inter', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            color: #333;
        }

        .container {
            max-width: 500px;
            padding: 20px;
            border-left: 8px solid #FF8C00; /* Garis Orange di samping */
        }

        /* Judul Kota Jakarta */
        h1 {
            font-size: 3.5rem;
            font-weight: 800;
            color: #FF8C00; /* Warna Orange Dominan */
            text-transform: uppercase;
            letter-spacing: -1px;
            margin-bottom: 10px;
            line-height: 1;
        }

        /* Dekorasi garis kuning kecil */
        .line {
            width: 60px;
            height: 4px;
            background-color: #FFD700; /* Warna Kuning */
            margin-bottom: 20px;
        }

        /* Deskripsi */
        p {
            font-size: 1.1rem;
            line-height: 1.6;
            color: #555;
            text-align: justify;
        }

        /* Footer tipis */
        .footer {
            margin-top: 30px;
            font-size: 0.8rem;
            font-weight: 700;
            color: #0409229d;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

    </style>
</head>
<body>

    <div class="container">
        <h1>Jakarta</h1>
        <div class="line"></div>
        <p>
            Ibu kota Jakarta merupakan pusat pemerintahan dan ekonomi Republik Indonesia. Sebuah wilayah dinamis yang memadukan modernitas urban dengan kekayaan sejarah bangsa.
        </p>
        <div class="footer">Ibukota Negara</div>
    </div>

</body>
</html>
